networks:
  robomart-network:
    driver: bridge

services:
  postgres:
    image: postgres:17
    container_name: robomart-postgres
    profiles: ["core"]
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: ${POSTGRES_USER:-robomart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-robomart}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - robomart-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-robomart}"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.17.0
    container_name: robomart-elasticsearch
    profiles: ["core"]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - robomart-network
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.9.0
    container_name: robomart-kafka
    profiles: ["core"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "${KAFKA_PORT:-29092}:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - robomart-network
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  schema-registry:
    image: confluentinc/cp-schema-registry:7.9.0
    container_name: robomart-schema-registry
    profiles: ["core"]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8085
    ports:
      - "${SCHEMA_REGISTRY_PORT:-8085}:8085"
    networks:
      - robomart-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8085/subjects || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: robomart-redis
    profiles: ["core"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - robomart-network
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak-db:
    image: postgres:17
    container_name: robomart-keycloak-db
    profiles: ["core"]
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
    ports:
      - "${KEYCLOAK_DB_PORT:-5433}:5432"
    volumes:
      - keycloak-data:/var/lib/postgresql/data
    networks:
      - robomart-network
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.4
    container_name: robomart-keycloak
    profiles: ["core"]
    depends_on:
      keycloak-db:
        condition: service_healthy
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
      KC_HTTP_PORT: 8180
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
    ports:
      - "${KEYCLOAK_PORT:-8180}:8180"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    networks:
      - robomart-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  postgres-order:
    image: postgres:17
    container_name: robomart-postgres-order
    profiles: ["core"]
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: ${POSTGRES_USER:-robomart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-robomart}
    ports:
      - "${ORDER_DB_PORT:-5434}:5432"
    volumes:
      - order-data:/var/lib/postgresql/data
    networks:
      - robomart-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-robomart}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-inventory:
    image: postgres:17
    container_name: robomart-postgres-inventory
    profiles: ["core"]
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: ${POSTGRES_USER:-robomart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-robomart}
    ports:
      - "${INVENTORY_DB_PORT:-5435}:5432"
    volumes:
      - inventory-data:/var/lib/postgresql/data
    networks:
      - robomart-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-robomart}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:17
    container_name: robomart-postgres-payment
    profiles: ["core"]
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: ${POSTGRES_USER:-robomart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-robomart}
    ports:
      - "${PAYMENT_DB_PORT:-5436}:5432"
    volumes:
      - payment-data:/var/lib/postgresql/data
    networks:
      - robomart-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-robomart}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-notification:
    image: postgres:17-alpine
    container_name: robomart-postgres-notification
    profiles: ["core"]
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: ${NOTIFICATION_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${NOTIFICATION_DB_PASSWORD:-postgres}
    ports:
      - "${NOTIFICATION_DB_PORT:-5437}:5432"
    volumes:
      - notification-data:/var/lib/postgresql/data
    networks:
      - robomart-network
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NOTIFICATION_DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: robomart-kafka-ui
    profiles: ["core"]
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: robomart-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8085
    ports:
      - "${KAFKA_UI_PORT:-9090}:8080"
    networks:
      - robomart-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/clusters || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ---- Backend App Services ----

  product-service:
    build:
      context: ../../backend
      dockerfile: Dockerfile.prebuilt
      target: product-service
    image: robomart/product-service:local
    container_name: robomart-product-service
    profiles: ["app"]
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/product_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-robomart}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-robomart}
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_PROPERTIES_SCHEMA_REGISTRY_URL: http://schema-registry:8085
      ROBOMART_PRODUCT_IMAGE_BASE_URL: http://localhost:8080
    networks:
      - robomart-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  cart-service:
    build:
      context: ../../backend
      dockerfile: Dockerfile.prebuilt
      target: cart-service
    image: robomart/cart-service:local
    container_name: robomart-cart-service
    profiles: ["app"]
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_PROPERTIES_SCHEMA_REGISTRY_URL: http://schema-registry:8085
      CHECKOUT_BASE_URL: http://localhost:5173/cart
      SPRING_AUTOCONFIGURE_EXCLUDE: org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
    networks:
      - robomart-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  order-service:
    build:
      context: ../../backend
      dockerfile: Dockerfile.prebuilt
      target: order-service
    image: robomart/order-service:local
    container_name: robomart-order-service
    profiles: ["app"]
    depends_on:
      postgres-order:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-order:5432/order_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-robomart}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-robomart}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_PROPERTIES_SCHEMA_REGISTRY_URL: http://schema-registry:8085
      SPRING_GRPC_CLIENT_INVENTORY_SERVICE_ADDRESS: static://inventory-service:9094
      SPRING_GRPC_CLIENT_PAYMENT_SERVICE_ADDRESS: static://payment-service:9095
    networks:
      - robomart-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  inventory-service:
    build:
      context: ../../backend
      dockerfile: Dockerfile.prebuilt
      target: inventory-service
    image: robomart/inventory-service:local
    container_name: robomart-inventory-service
    profiles: ["app"]
    depends_on:
      postgres-inventory:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-inventory:5432/inventory_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-robomart}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-robomart}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_PROPERTIES_SCHEMA_REGISTRY_URL: http://schema-registry:8085
    networks:
      - robomart-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  payment-service:
    build:
      context: ../../backend
      dockerfile: Dockerfile.prebuilt
      target: payment-service
    image: robomart/payment-service:local
    container_name: robomart-payment-service
    profiles: ["app"]
    depends_on:
      postgres-payment:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-payment:5432/payment_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-robomart}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-robomart}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_PROPERTIES_SCHEMA_REGISTRY_URL: http://schema-registry:8085
    networks:
      - robomart-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8086/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  notification-service:
    build:
      context: ../../backend
      dockerfile: Dockerfile.prebuilt
      target: notification-service
    image: robomart/notification-service:local
    container_name: robomart-notification-service
    profiles: ["app"]
    depends_on:
      postgres-notification:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-notification:5432/notification_db
      SPRING_DATASOURCE_USERNAME: ${NOTIFICATION_DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${NOTIFICATION_DB_PASSWORD:-postgres}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_PROPERTIES_SCHEMA_REGISTRY_URL: http://schema-registry:8085
      KEYCLOAK_JWK_SET_URI: http://keycloak:8180/realms/robomart/protocol/openid-connect/certs
    networks:
      - robomart-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8087/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  api-gateway:
    build:
      context: ../../backend
      dockerfile: Dockerfile.prebuilt
      target: api-gateway
    image: robomart/api-gateway:local
    container_name: robomart-api-gateway
    profiles: ["app"]
    depends_on:
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      product-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8180/realms/robomart/protocol/openid-connect/certs
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      GATEWAY_SERVICES_PRODUCT_SERVICE: http://product-service:8081
      GATEWAY_SERVICES_CART_SERVICE: http://cart-service:8082
      GATEWAY_SERVICES_ORDER_SERVICE: http://order-service:8083
      GATEWAY_SERVICES_INVENTORY_SERVICE: http://inventory-service:8084
      GATEWAY_SERVICES_NOTIFICATION_SERVICE: http://notification-service:8087
      GATEWAY_CORS_CUSTOMER_ORIGIN: http://localhost:5173
      GATEWAY_CORS_ADMIN_ORIGIN: http://localhost:5174
      GATEWAY_CORS_KEYCLOAK_ORIGIN: http://localhost:8180
    networks:
      - robomart-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---- Frontend App Services ----

  customer-website:
    build:
      context: ../../frontend
      dockerfile: customer-website/Dockerfile
    image: robomart/customer-website:local
    container_name: robomart-customer-website
    profiles: ["app"]
    ports:
      - "5173:80"
    networks:
      - robomart-network
    deploy:
      resources:
        limits:
          memory: 128M

  admin-dashboard:
    build:
      context: ../../frontend
      dockerfile: admin-dashboard/Dockerfile
    image: robomart/admin-dashboard:local
    container_name: robomart-admin-dashboard
    profiles: ["app"]
    ports:
      - "5174:80"
    networks:
      - robomart-network
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres-data:
  elasticsearch-data:
  kafka-data:
  redis-data:
  keycloak-data:
  order-data:
  inventory-data:
  payment-data:
  notification-data:
