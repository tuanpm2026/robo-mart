services:
  pact-broker-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pact_broker
      POSTGRES_USER: pact
      POSTGRES_PASSWORD: pact
    volumes:
      - pact-broker-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pact -d pact_broker"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  pact-broker:
    image: pactfoundation/pact-broker:2.130.1
    ports:
      - "9292:9292"
    depends_on:
      pact-broker-db:
        condition: service_healthy
    environment:
      PACT_BROKER_DATABASE_URL: "postgres://pact:pact@pact-broker-db/pact_broker"
      PACT_BROKER_BASIC_AUTH_USERNAME: admin
      PACT_BROKER_BASIC_AUTH_PASSWORD: admin
      PACT_BROKER_ALLOW_PUBLIC_READ: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9292/diagnostic/status/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  pact-broker-db-data:
