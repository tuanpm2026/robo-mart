apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      containers:
      - name: kafka-ui
        image: provectuslabs/kafka-ui:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: KAFKA_CLUSTERS_0_NAME
          value: robomart
        - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
          value: kafka.robomart.svc.cluster.local:9092
        - name: KAFKA_CLUSTERS_0_SCHEMAREGISTRY
          value: http://schema-registry.robomart.svc.cluster.local:8081
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
