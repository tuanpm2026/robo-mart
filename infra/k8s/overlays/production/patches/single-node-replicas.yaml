# Override replicas to 1 for all app deployments on single-node clusters.
# On a single-node setup the HPA minimum of 2 would cause scheduling pressure.
# This patch sets replicas=1 so all pods land on the single node.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: robomart
spec:
  replicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: robomart
spec:
  replicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: robomart
spec:
  replicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: robomart
spec:
  replicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: robomart
spec:
  replicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: robomart
spec:
  replicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: robomart
spec:
  replicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-website
  namespace: robomart
spec:
  replicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-dashboard
  namespace: robomart
spec:
  replicas: 1
