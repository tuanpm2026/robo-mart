apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: robomart
resources:
- ../../base

# Image tags are updated automatically by CD workflow after each successful build.
# Do not edit the newTag values manually — they are managed by:
#   kustomize edit set image ghcr.io/tuanpm2026/robomart/<service>:<tag>
patches:
- path: patches/single-node-replicas.yaml

images:
- name: ghcr.io/robomart/admin-dashboard
  newName: ghcr.io/tuanpm2026/robomart/admin-dashboard
  newTag: main-b02eb79
- name: ghcr.io/robomart/api-gateway
  newName: ghcr.io/tuanpm2026/robomart/api-gateway
  newTag: main-896377a
- name: ghcr.io/robomart/cart-service
  newName: ghcr.io/tuanpm2026/robomart/cart-service
  newTag: main-896377a
- name: ghcr.io/robomart/customer-website
  newName: ghcr.io/tuanpm2026/robomart/customer-website
  newTag: main-b02eb79
- name: ghcr.io/robomart/inventory-service
  newName: ghcr.io/tuanpm2026/robomart/inventory-service
  newTag: main-896377a
- name: ghcr.io/robomart/notification-service
  newName: ghcr.io/tuanpm2026/robomart/notification-service
  newTag: main-896377a
- name: ghcr.io/robomart/order-service
  newName: ghcr.io/tuanpm2026/robomart/order-service
  newTag: main-896377a
- name: ghcr.io/robomart/payment-service
  newName: ghcr.io/tuanpm2026/robomart/payment-service
  newTag: main-896377a
- name: ghcr.io/robomart/product-service
  newName: ghcr.io/tuanpm2026/robomart/product-service
  newTag: main-896377a
