apiVersion: v1
kind: ConfigMap
metadata:
  name: robomart-config
  namespace: robomart
data:
  # Kafka
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka.robomart.svc.cluster.local:9092"
  KAFKA_BOOTSTRAP_SERVERS: "kafka.robomart.svc.cluster.local:9092"
  SPRING_KAFKA_PROPERTIES_SCHEMA_REGISTRY_URL: "http://schema-registry.robomart.svc.cluster.local:8081"
  SCHEMA_REGISTRY_URL: "http://schema-registry.robomart.svc.cluster.local:8081"
  # Redis
  SPRING_DATA_REDIS_HOST: "redis-master.robomart.svc.cluster.local"
  SPRING_DATA_REDIS_PORT: "6379"
  # Elasticsearch
  SPRING_ELASTICSEARCH_URIS: "http://elasticsearch.robomart.svc.cluster.local:9200"
  # Keycloak / JWT
  SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: "http://keycloak.robomart.svc.cluster.local/realms/robomart"
  KEYCLOAK_JWK_SET_URI: "http://keycloak.robomart.svc.cluster.local/realms/robomart/protocol/openid-connect/certs"
  # Tracing
  MANAGEMENT_OTLP_TRACING_ENDPOINT: "http://tempo.monitoring.svc.cluster.local:4318/v1/traces"
  TRACING_SAMPLE_RATE: "0.1"
  # Actuator — ensure prometheus endpoint is exposed even when dev profile reduces it
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,metrics,prometheus"
  MANAGEMENT_ENDPOINT_HEALTH_VALIDATE_GROUP_MEMBERSHIP: "false"
  # Service-to-service URLs (used by notification-service and api-gateway routing)
  ORDER_SERVICE_URL: "http://order-service:8083"
  PRODUCT_SERVICE_URL: "http://product-service:8081"
  CART_SERVICE_URL: "http://cart-service:8082"
  INVENTORY_SERVICE_URL: "http://inventory-service:8084"
  PAYMENT_SERVICE_URL: "http://payment-service:8086"
  NOTIFICATION_SERVICE_URL: "http://notification-service:8087"
  API_GATEWAY_URL: "http://api-gateway:8080"
  # order-service gRPC client addresses (K8s DNS overrides localhost defaults)
  GRPC_CLIENT_INVENTORY_SERVICE_ADDRESS: "static://inventory-service:9094"
  GRPC_CLIENT_PAYMENT_SERVICE_ADDRESS: "static://payment-service:9095"
  # api-gateway downstream routes
  GATEWAY_SERVICES_PRODUCT_SERVICE: "http://product-service:8081"
  GATEWAY_SERVICES_CART_SERVICE: "http://cart-service:8082"
  GATEWAY_SERVICES_ORDER_SERVICE: "http://order-service:8083"
  GATEWAY_SERVICES_INVENTORY_SERVICE: "http://inventory-service:8084"
  GATEWAY_SERVICES_PAYMENT_SERVICE: "http://payment-service:8086"
  GATEWAY_SERVICES_NOTIFICATION_SERVICE: "http://notification-service:8087"
  # CORS allowed origins
  CORS_CUSTOMER_ORIGIN: "https://app.tuanpm.xyz"
  CORS_ADMIN_ORIGIN: "https://admin.tuanpm.xyz"
  CORS_KEYCLOAK_ORIGIN: "http://keycloak.robomart.svc.cluster.local"
