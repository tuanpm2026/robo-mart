apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: customer-website
  namespace: robomart
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: customer-website
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
