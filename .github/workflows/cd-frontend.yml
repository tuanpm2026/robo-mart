name: CD Frontend

on:
  workflow_run:
    workflows: [ "Frontend CI" ]
    types: [ completed ]
    branches: [ main ]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Git SHA to build & deploy (defaults to HEAD of main)'
        required: false
        default: ''

concurrency:
  group: deploy-frontend-main
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/robomart

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        app:
          - name: customer-website
            dockerfile: frontend/customer-website/Dockerfile
          - name: admin-dashboard
            dockerfile: frontend/admin-dashboard/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.app.name }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and Push ${{ matrix.app.name }}
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: ${{ matrix.app.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-image-tags:
    name: Update Image Tags (GitOps)
    needs: build-and-push
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.head_branch == 'main'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.4.3'

      - name: Update image tags in overlay
        run: |
          INPUT_SHA="${{ github.event.inputs.sha }}"
          SHA="${INPUT_SHA:-${{ github.event.workflow_run.head_sha || github.sha }}}"
          SHORT_SHA="${SHA:0:7}"
          IMAGE_TAG="main-${SHORT_SHA}"
          REGISTRY="ghcr.io/${{ env.IMAGE_PREFIX }}"

          cd infra/k8s/overlays/production

          for APP in customer-website admin-dashboard; do
            kustomize edit set image \
              ghcr.io/robomart/${APP}=${REGISTRY}/${APP}:${IMAGE_TAG}
          done

          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/overlays/production/kustomization.yaml
          git diff --cached --quiet && echo "No tag change, skipping commit" && exit 0
          git commit -m "chore: bump frontend images to ${{ env.IMAGE_TAG }} [skip ci]"
          git push
