name: CD Deploy

on:
  workflow_run:
    workflows: [ "Backend CI" ]
    types: [ completed ]
    branches: [ main ]

concurrency:
  group: deploy-main
  cancel-in-progress: false  # Never cancel an in-progress deploy

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/robomart

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      packages: write  # Required for ghcr.io push

    strategy:
      matrix:
        service:
          - name: product-service
            port: 8081
          - name: cart-service
            port: 8082
          - name: order-service
            port: 8083
          - name: inventory-service
            port: 8084
          - name: payment-service
            port: 8086
          - name: notification-service
            port: 8087
          - name: api-gateway
            port: 8080

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and Push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/${{ matrix.service.name }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-image-tags:
    name: Update Image Tags (GitOps)
    needs: build-and-push
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: github.event.workflow_run.head_branch == 'main'

    permissions:
      contents: write  # needed to commit updated kustomization.yaml

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a PAT so the commit triggers downstream workflows if needed.
          # Falls back to GITHUB_TOKEN (push will have [skip ci] anyway).
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.4.3'

      - name: Update image tags in overlay
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${SHA:0:7}"
          IMAGE_TAG="main-${SHORT_SHA}"
          REGISTRY="ghcr.io/${{ env.IMAGE_PREFIX }}"

          cd infra/k8s/overlays/production

          for SERVICE in api-gateway product-service cart-service order-service \
                         inventory-service payment-service notification-service; do
            kustomize edit set image \
              ghcr.io/robomart/${SERVICE}=${REGISTRY}/${SERVICE}:${IMAGE_TAG}
          done

          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/overlays/production/kustomization.yaml
          # Only commit if there's an actual change (idempotent)
          git diff --cached --quiet && echo "No tag change, skipping commit" && exit 0
          git commit -m "chore: bump all images to ${{ env.IMAGE_TAG }} [skip ci]"
          git push
