name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      checks: write        # required by dorny/test-reporter to create check runs
      pull-requests: write # required by dorny/test-reporter to annotate PRs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # Step 1: Build all modules in parallel (skip tests — separate step)
      - name: Build (parallel, skip tests)
        working-directory: backend
        run: ./mvnw install -T 1C -DskipTests -DskipITs -DskipE2ETests

      # Step 2: Checkstyle
      - name: Checkstyle
        working-directory: backend
        run: ./mvnw checkstyle:check

      # Step 3: Unit tests + ArchUnit validation (all services in parallel)
      - name: Unit Tests (includes ArchUnit layer validation)
        working-directory: backend
        run: ./mvnw test -T 1C -DskipITs -DskipE2ETests

      # Step 4: Integration tests (Testcontainers — Docker available on ubuntu-24.04)
      - name: Integration Tests
        working-directory: backend
        run: ./mvnw verify -DskipTests -DskipE2ETests
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"

      # Step 5: Contract tests (Pact provider verification — product-service and order-service)
      - name: Contract Tests (Pact Provider)
        working-directory: backend
        run: |
          ./mvnw verify -pl :product-service,:order-service -Dit.test=*PactProviderIT -DfailIfNoTests=false
        env:
          PACT_BROKER_URL: ${{ vars.PACT_BROKER_URL || '' }}
          TESTCONTAINERS_RYUK_DISABLED: "true"
        continue-on-error: false

      # Step 6: OpenAPI drift detection (skipped if no baselines committed yet)
      # Note: specs are generated by @SpringBootTest-based tests and written to target/openapi.json
      - name: OpenAPI Drift Detection
        run: |
          if [ -d "docs/api" ] && ls docs/api/*.json > /dev/null 2>&1; then
            bash infra/ci/scripts/check-openapi-drift.sh
          else
            echo "No API baselines found — skipping drift check on first run"
          fi

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend Test Results
          path: backend/**/target/surefire-reports/TEST-*.xml,backend/**/target/failsafe-reports/TEST-*.xml
          reporter: java-junit

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-reports
          path: |
            backend/**/target/surefire-reports/
            backend/**/target/failsafe-reports/
          retention-days: 7
