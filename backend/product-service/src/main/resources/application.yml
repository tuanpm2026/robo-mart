spring:
  application:
    name: product-service
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 52MB
  flyway:
    enabled: true
    locations: classpath:db/migration
  elasticsearch:
    uris: http://localhost:9200
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:29092
    properties:
      schema.registry.url: http://localhost:8085

server:
  port: 8081

robomart:
  product:
    image-storage-path: /tmp/robomart-images
    image-base-url: http://localhost:8081

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/product_db
    username: robomart
    password: robomart
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

---
spring:
  config:
    activate:
      on-profile: demo
  flyway:
    locations: classpath:db/migration,classpath:db/seed

---
spring:
  config:
    activate:
      on-profile: test
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    locations: classpath:db/migration,classpath:db/seed
