spring:
  application:
    name: order-service
  profiles:
    active: dev
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:29092
    properties:
      schema.registry.url: http://localhost:8085
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        interceptor.classes: com.robomart.common.kafka.CorrelationIdKafkaProducerInterceptor
    consumer:
      properties:
        interceptor.classes: com.robomart.common.kafka.CorrelationIdKafkaConsumerInterceptor
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
  grpc:
    server:
      port: 9093
    client:
      inventory-service:
        address: '${GRPC_CLIENT_INVENTORY_SERVICE_ADDRESS:static://localhost:9094}'
        negotiation-type: plaintext
      payment-service:
        address: '${GRPC_CLIENT_PAYMENT_SERVICE_ADDRESS:static://localhost:9095}'
        negotiation-type: plaintext
  lifecycle:
    timeout-per-shutdown-phase: 25s

saga:
  steps:
    default-timeout: 10s
    timeouts:
      # Keys must exactly match SagaStep.getName() return values
      ReserveInventory: 10s
      ProcessPayment: 10s
      ReleaseInventory: 10s
      RefundPaymentStep: 10s
  dead-saga-detection:
    enabled: true
    stuck-threshold: 5m
    check-interval-ms: 60000
    initial-delay-ms: 30000

server:
  port: 8083
  shutdown: graceful

management:
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:1.0}
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    probes:
      enabled: true
  endpoint:
    health:
      show-details: always
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,kafka
  metrics:
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
      percentiles:
        "[http.server.requests]": 0.5,0.95,0.99

resilience4j:
  circuitbreaker:
    instances:
      inventory-service:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 5
        failure-rate-threshold: 100
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 1
        record-exceptions:
          - io.grpc.StatusRuntimeException
          - com.robomart.order.grpc.InventoryServiceUnavailableException
      payment-service:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 5
        failure-rate-threshold: 100
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 1
        record-exceptions:
          - io.grpc.StatusRuntimeException
          - com.robomart.order.grpc.PaymentServiceUnavailableException
  retry:
    instances:
      inventory-service:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - io.grpc.StatusRuntimeException
      payment-service:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - io.grpc.StatusRuntimeException

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5434/order_db
    username: robomart
    password: robomart
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  metrics:
    distribution:
      percentiles:
        "[http.server.requests]": 0.95

---
spring:
  config:
    activate:
      on-profile: demo
  flyway:
    locations: classpath:db/migration,classpath:db/seed

---
spring:
  config:
    activate:
      on-profile: test
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    locations: classpath:db/migration,classpath:db/seed
