spring:
  application:
    name: order-service
  profiles:
    active: dev
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:29092
    properties:
      schema.registry.url: http://localhost:8085
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  grpc:
    server:
      port: 9093
    client:
      inventory-service:
        address: 'static://localhost:9094'
        negotiation-type: plaintext
      payment-service:
        address: 'static://localhost:9095'
        negotiation-type: plaintext
  lifecycle:
    timeout-per-shutdown-phase: 25s

server:
  port: 8083
  shutdown: graceful

resilience4j:
  circuitbreaker:
    instances:
      inventory-service:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 5
        failure-rate-threshold: 100
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 1
        record-exceptions:
          - io.grpc.StatusRuntimeException
          - com.robomart.order.grpc.InventoryServiceUnavailableException
      payment-service:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 5
        failure-rate-threshold: 100
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 1
        record-exceptions:
          - io.grpc.StatusRuntimeException
          - com.robomart.order.grpc.PaymentServiceUnavailableException
  retry:
    instances:
      inventory-service:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - io.grpc.StatusRuntimeException
      payment-service:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - io.grpc.StatusRuntimeException

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5434/order_db
    username: robomart
    password: robomart
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  metrics:
    distribution:
      percentiles:
        "[http.server.requests]": 0.95

---
spring:
  config:
    activate:
      on-profile: demo
  flyway:
    locations: classpath:db/migration,classpath:db/seed

---
spring:
  config:
    activate:
      on-profile: test
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    locations: classpath:db/migration,classpath:db/seed
