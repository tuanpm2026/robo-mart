spring:
  application:
    name: api-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/robomart

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

  lifecycle:
    timeout-per-shutdown-phase: 25s

server:
  port: 8080
  shutdown: graceful

# Downstream service URIs
gateway:
  services:
    product-service: http://localhost:8081
    cart-service: http://localhost:8082
    order-service: http://localhost:8083
    inventory-service: http://localhost:8084
    payment-service: http://localhost:8086
    notification-service: http://localhost:8087
  cors:
    customer-origin: http://localhost:5173
    admin-origin: http://localhost:5174
    keycloak-origin: http://localhost:8180
  # Rate limit configuration (AC3: configurable per endpoint)
  rate-limit:
    authenticated:
      replenish-rate: 2        # tokens/sec → ~120 req/min sustained, burst up to 100 immediately
      burst-capacity: 100      # max burst
    anonymous:
      replenish-rate: 1        # tokens/sec
      burst-capacity: 60       # max tokens in bucket
      requested-tokens: 3      # 60 tokens/min ÷ 3 = 20 req/min

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: when-authorized
    gateway:
      enabled: true
  metrics:
    distribution:
      percentiles:
        "[http.server.requests]": 0.95
