spring:
  application:
    name: notification-service
  profiles:
    active: dev
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8085}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/robomart/protocol/openid-connect/certs}
  lifecycle:
    timeout-per-shutdown-phase: 25s

server:
  port: 8087
  shutdown: graceful

notification:
  order-service:
    url: ${ORDER_SERVICE_URL:http://localhost:8083}
  product-service:
    url: ${PRODUCT_SERVICE_URL:http://localhost:8081}
  cart-service:
    url: ${CART_SERVICE_URL:http://localhost:8082}
  inventory-service:
    url: ${INVENTORY_SERVICE_URL:http://localhost:8084}
  payment-service:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8086}
  notification-self:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8087}
  api-gateway:
    url: ${API_GATEWAY_URL:http://localhost:8080}
  admin-email: ${ADMIN_EMAIL:admin@robomart.local}

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5437/notification_db
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  metrics:
    distribution:
      percentiles:
        "[http.server.requests]": 0.95

---
spring:
  config:
    activate:
      on-profile: test
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8180/realms/robomart/protocol/openid-connect/certs
