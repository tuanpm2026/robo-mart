spring:
  application:
    name: notification-service
  profiles:
    active: dev
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8085}

server:
  port: 8087

notification:
  order-service:
    url: ${ORDER_SERVICE_URL:http://localhost:8083}
  product-service:
    url: ${PRODUCT_SERVICE_URL:http://localhost:8081}
  admin-email: ${ADMIN_EMAIL:admin@robomart.local}

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5437/notification_db
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

---
spring:
  config:
    activate:
      on-profile: test
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    locations: classpath:db/migration
