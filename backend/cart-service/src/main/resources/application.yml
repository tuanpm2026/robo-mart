spring:
  application:
    name: cart-service
  profiles:
    active: dev
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:29092
    properties:
      schema.registry.url: http://localhost:8085
    producer:
      properties:
        interceptor.classes: com.robomart.common.kafka.CorrelationIdKafkaProducerInterceptor
    template:
      observation-enabled: true
  lifecycle:
    timeout-per-shutdown-phase: 25s

server:
  port: 8082
  shutdown: graceful

robomart:
  cart:
    ttl-minutes: 1440

notification:
  checkout-base-url: ${CHECKOUT_BASE_URL:http://localhost:5173/cart}

management:
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:1.0}
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    probes:
      enabled: true
  endpoint:
    health:
      show-details: always
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,redis,kafka
  metrics:
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
      percentiles:
        "[http.server.requests]": 0.5,0.95,0.99

---
spring:
  config:
    activate:
      on-profile: test
  data:
    redis:
      host: localhost
      port: 6379
