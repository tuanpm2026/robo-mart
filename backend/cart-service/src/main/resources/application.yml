spring:
  application:
    name: cart-service
  profiles:
    active: dev
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:29092
    properties:
      schema.registry.url: http://localhost:8085
  lifecycle:
    timeout-per-shutdown-phase: 25s

server:
  port: 8082
  shutdown: graceful

robomart:
  cart:
    ttl-minutes: 1440

notification:
  checkout-base-url: ${CHECKOUT_BASE_URL:http://localhost:5173/cart}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  metrics:
    distribution:
      percentiles:
        "[http.server.requests]": 0.95

---
spring:
  config:
    activate:
      on-profile: test
  data:
    redis:
      host: localhost
      port: 6379
